<section class="hrms-page">
  <div class="hrms-panel hrms-panel--framed">
    <h1 class="hrms-title">My Profile</h1>
    <p class="hrms-subtitle">Profile details are available here for quick review and HR record validation.</p>

    <div class="hrms-grid hrms-grid--2">
      <section class="hrms-card">
        <div class="profile-avatar">KK</div>
        <h2 class="hrms-card__title mt-3">Krupa Kadia</h2>
        <p class="hrms-card__text">Software Engineer at Optimum Financial Solutions</p>
      </section>

      <section class="hrms-card">
        <div class="profile-fields">
          @for (field of profileFields; track field.label) {
            <div class="profile-field">
              <span>{{ field.label }}</span>
              <strong>{{ field.value }}</strong>
            </div>
          }
        </div>
      </section>
    </div>
  </div>
</section>
