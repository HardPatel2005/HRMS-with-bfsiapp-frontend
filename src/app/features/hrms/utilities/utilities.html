<section class="hrms-page">
  <div class="hrms-panel hrms-panel--framed">
    <h1 class="hrms-title">Utilities</h1>

    <div class="hrms-grid hrms-grid--3 utilities-grid">
      @for (item of items; track item.title) {
        <a class="utility-tile" [routerLink]="item.route">
          <span class="utility-tile__icon">{{ item.icon }}</span>
          <span class="utility-tile__label">{{ item.title }}</span>
        </a>
      }
    </div>
  </div>
</section>
