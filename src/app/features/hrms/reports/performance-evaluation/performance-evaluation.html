<section class="hrms-page">
  <div class="hrms-panel hrms-panel--framed">
    <h1 class="hrms-title">Performance Evaluation</h1>
    <p class="hrms-subtitle">View past evaluations and submit your self-evaluation for the current review period.</p>

    <div class="hrms-grid hrms-grid--3">
      @for (metric of metrics; track metric.title) {
        <article class="hrms-card">
          <div class="hrms-kicker">{{ metric.title.charAt(0) }}</div>
          <h2 class="hrms-card__title">{{ metric.title }}</h2>
          <p class="metric-value">{{ metric.value }}</p>
          <p class="hrms-card__text">{{ metric.note }}</p>
        </article>
      }
    </div>

    <div class="text-center mt-4">
      <button class="hrms-btn" type="button">Submit Self Evaluation</button>
    </div>
  </div>
</section>
