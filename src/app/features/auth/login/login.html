<app-loading-spinner [isLoading]="loading" message="Authenticating..."></app-loading-spinner>

<div class="container py-4 py-md-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-3">Login</h3>
          <p class="text-muted mb-4">Sign in to continue to your BFSI dashboard.</p>

          <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                id="email"
                type="email"
                formControlName="email"
                class="form-control"
                [class.is-invalid]="hasError('email')"
                placeholder="name@company.com"
                autocomplete="email"
              />
              <div class="invalid-feedback" *ngIf="hasError('email')">
                Enter a valid email address.
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                id="password"
                type="password"
                formControlName="password"
                class="form-control"
                [class.is-invalid]="hasError('password')"
                placeholder="Enter password"
                autocomplete="current-password"
              />
              <div class="invalid-feedback" *ngIf="hasError('password')">
                Password must be at least 8 characters.
              </div>
            </div>

            <button class="btn btn-primary w-100" type="submit">Login</button>
          </form>

          <div class="d-grid gap-2 mt-3">
            <button class="btn btn-outline-danger" type="button" (click)="loginWithGoogle()">Continue with Google</button>
            <button class="btn btn-outline-secondary" type="button" (click)="oauth('microsoft')">Continue with Microsoft</button>
          </div>

          <p class="mt-3 mb-0 text-center">
            Don’t have an account?
            <a routerLink="/register">Register</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
