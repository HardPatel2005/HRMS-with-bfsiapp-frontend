<div class="spinner-overlay" *ngIf="isLoading()">
  <div class="spinner-container">
    <div class="spinner-border text-primary" role="status" [style.width]="size()" [style.height]="size()">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-3 text-white" *ngIf="message()">{{ message() }}</p>
  </div>
</div>
